name: Sync BGStudio

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: scripts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow (for fetch-flag.py)
        run: pip install --quiet Pillow
        working-directory: ${{ github.workspace }}

      - name: Install dependencies
        run: npm install

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Run BGStudio sync
        env:
          BGSTUDIO_USER: ${{ secrets.BGSTUDIO_USER }}
          BGSTUDIO_PASS: ${{ secrets.BGSTUDIO_PASS }}
        run: node sync-bgstudio.js

      - name: Upload league + roster + new flags artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: leaguedata-${{ github.run_id }}
          path: |
            scripts/out/leaguedata.csv
            scripts/out/players.json
            scripts/out/new_flags/
          retention-days: 90
          if-no-files-found: warn

      - name: Upload failure screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshot-${{ github.run_id }}
          path: scripts/out/failure.png
          retention-days: 14
          if-no-files-found: ignore

      - name: Write job summary
        if: success()
        working-directory: ${{ github.workspace }}
        run: |
          CSV=scripts/out/leaguedata.csv
          PLAYERS=scripts/out/players.json
          {
            echo "## BGStudio sync — Shabi Israel"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Status | success |"
            echo "| Timestamp | \`$(date -u +'%Y-%m-%d %H:%M:%S UTC')\` |"
            echo "| Run ID | \`${{ github.run_id }}\` |"
            if [ -f "$CSV" ]; then
              echo "| CSV size | $(wc -c < "$CSV") bytes |"
              echo "| Lines | $(wc -l < "$CSV") |"
            else
              echo "| CSV | _not produced (empty league?)_ |"
            fi
            if [ -f "$PLAYERS" ]; then
              echo "| Players | $(grep -c '"username"' "$PLAYERS") |"
            fi
            if [ -d scripts/out/new_flags ]; then
              NEW_FLAGS=$(ls scripts/out/new_flags/ 2>/dev/null | tr '\n' ' ' | sed 's/ $//')
              [ -n "$NEW_FLAGS" ] && echo "| New flags | \`$NEW_FLAGS\` |"
            fi
            echo ""
            if [ -f "$CSV" ]; then
              echo "### CSV preview (first 5 lines)"
              echo ""
              echo '```csv'
              head -5 "$CSV"
              echo '```'
              echo ""
            fi
            echo "Download from the **Artifacts** section above (\`leaguedata-${{ github.run_id }}\`)."
          } >> "$GITHUB_STEP_SUMMARY"
