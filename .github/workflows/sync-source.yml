name: Sync External Source

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Sync mode — manual Run defaults to fast (~20s). Scheduled / external dispatches override to full (anti-bot disguise, 1-60min).'
        required: false
        default: 'fast'
        type: choice
        options:
          - fast
          - full
      leagues:
        description: 'JSON array of leagues to sync in one session. Empty = auto-detect active league. Example: [{"folder":"Shabi Israel June 2026","source_league_name":"Shabi Israel"}]'
        required: false
        default: ''
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    defaults:
      run:
        working-directory: scripts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow (for fetch-flag.py)
        run: pip install --quiet Pillow
        working-directory: ${{ github.workspace }}

      - name: Install dependencies
        run: npm install

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Restore External Source session cookie
        uses: actions/cache/restore@v4
        with:
          path: scripts/out/session-state.json
          key: source-session-${{ github.run_id }}
          restore-keys: |
            source-session-

      - name: Run External Source sync
        env:
          SOURCE_URL: ${{ secrets.SOURCE_URL }}
          SOURCE_USER: ${{ secrets.SOURCE_USER }}
          SOURCE_PASS: ${{ secrets.SOURCE_PASS }}
          SYNC_MODE: ${{ github.event_name == 'workflow_dispatch' && (inputs.mode || 'fast') || 'full' }}
          LEAGUES: ${{ inputs.leagues || '' }}
        run: node sync-source.js

      - name: Save External Source session cookie
        if: success()
        uses: actions/cache/save@v4
        with:
          path: scripts/out/session-state.json
          key: source-session-${{ github.run_id }}

      - name: Upload league + roster + new flags artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: leaguedata-${{ github.run_id }}
          path: |
            scripts/out/**/leaguedata.csv
            scripts/out/**/players.json
            scripts/out/**/league_params.json
            scripts/out/**/new_flags/
          retention-days: 90
          if-no-files-found: warn

      - name: Upload failure screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshot-${{ github.run_id }}
          path: scripts/out/failure.png
          retention-days: 14
          if-no-files-found: ignore

      - name: Write job summary
        if: success()
        working-directory: ${{ github.workspace }}
        run: |
          {
            echo "## External Source sync"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Status | success |"
            echo "| Mode | \`${{ inputs.mode || 'full' }}\` |"
            echo "| Timestamp | \`$(date -u +'%Y-%m-%d %H:%M:%S UTC')\` |"
            echo "| Run ID | \`${{ github.run_id }}\` |"
            echo ""
            # One section per league subdirectory under scripts/out/
            for dir in scripts/out/*/; do
              [ -d "$dir" ] || continue
              folder=$(basename "$dir")
              CSV="${dir}leaguedata.csv"
              PLAYERS="${dir}players.json"
              PARAMS="${dir}league_params.json"
              FLAGS_DIR="${dir}new_flags"
              echo "### \`$folder\`"
              echo ""
              echo "| Field | Value |"
              echo "|---|---|"
              if [ -f "$CSV" ]; then
                echo "| CSV size | $(wc -c < "$CSV") bytes |"
                echo "| Lines | $(wc -l < "$CSV") |"
              else
                echo "| CSV | _not produced (empty league?)_ |"
              fi
              if [ -f "$PLAYERS" ]; then
                echo "| Players | $(grep -c '"username"' "$PLAYERS") |"
              fi
              if [ -d "$FLAGS_DIR" ]; then
                NEW_FLAGS=$(ls "$FLAGS_DIR" 2>/dev/null | tr '\n' ' ' | sed 's/ $//')
                [ -n "$NEW_FLAGS" ] && echo "| New flags | \`$NEW_FLAGS\` |"
              fi
              if [ -f "$PARAMS" ]; then
                echo "| CustomFlags update | _suggested — see \`$folder/league_params.json\` in artifact_ |"
              fi
              echo ""
              if [ -f "$CSV" ]; then
                echo "#### CSV preview (first 5 lines)"
                echo ""
                echo '```csv'
                head -5 "$CSV"
                echo '```'
                echo ""
              fi
            done
            echo "Download from the **Artifacts** section above (\`leaguedata-${{ github.run_id }}\`)."
          } >> "$GITHUB_STEP_SUMMARY"
