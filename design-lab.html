        /* When rendering the in-league card (table E), the player name
           becomes a link to the general player card. The lab's click
           interceptor (rewriteToLab) catches `player.html?…`
           and switches the lab view to `view=player-general` without a
           full reload, so the same variant choice carries over. */
        function nameLink(p, opts) {
            const text = escapeHtml(p.name);
            if (!opts || !opts.inLeague) return text;
            return `<a class="pl-name-link" href="player.html?player=${encodeURIComponent(p.name)}">${text}</a>`;
        }

        /* All HEADER_RENDERERS take an optional second arg `opts`. When
           opts.inLeague is true, the renderer omits the "Joined …" and
           "N leagues" meta items — those belong on the general player
           card (player.html), not on the per-league player card. */
        const HEADER_RENDERERS = {
            v7(p, opts = {}) {
                const avatar = p.photoPath
                    ? `<img class="v7-avatar-img" src="${escapeHtml(p.photoPath)}" alt="${escapeHtml(p.name)}">`
                    : `<div class="v7-avatar">${escapeHtml(p.initials)}</div>`;
                const dot = `<span class="v7-dot-wrap"><span class="pl-status-dot ${p.statusDotClass}" title="${escapeHtml(p.statusDotTitle)}"></span></span>`;
                const meta = [
                    p.fullName && `<em class="v7-fullname">${escapeHtml(p.fullName)}</em>`,
                    !opts.inLeague && p.joinedFormatted && `Joined ${escapeHtml(p.joinedFormatted)}`,
                    !opts.inLeague && `<span class="leagues">${p.leagueCount} ${p.leagueCount === 1 ? 'league' : 'leagues'}</span>`,
                ].filter(Boolean).join(' <span class="sep">·</span> ');
                return `<div class="v7-card">
                    <div class="v7-avatar-wrap">${avatar}${dot}</div>
                    <div class="v7-info">
                        <div class="v7-name-line">
                            ${flagImg('v7-flag', p.flagCode)}
                            <span class="v7-name">${nameLink(p, opts)}</span>
                            ${p.titles.map(titleChip).join('')}
                        </div>
                        <div class="v7-meta">${meta}</div>
                    </div>
                </div>`;
            },

            /* V7a — identical to V7 except the avatar uses V12's
               rounded-square shape and size. Renders the same HTML as
               V7 (so all inner classes still match) wrapped in an
               extra `v7a-card` class that drives the CSS override. */
            v7a(p, opts = {}) {
                const avatar = p.photoPath
                    ? `<img class="v7-avatar-img" src="${escapeHtml(p.photoPath)}" alt="${escapeHtml(p.name)}">`
                    : `<div class="v7-avatar">${escapeHtml(p.initials)}</div>`;
                const dot = `<span class="v7-dot-wrap"><span class="pl-status-dot ${p.statusDotClass}" title="${escapeHtml(p.statusDotTitle)}"></span></span>`;
                const meta = [
                    p.fullName && `<em class="v7-fullname">${escapeHtml(p.fullName)}</em>`,
                    !opts.inLeague && p.joinedFormatted && `Joined ${escapeHtml(p.joinedFormatted)}`,
                    !opts.inLeague && `<span class="leagues">${p.leagueCount} ${p.leagueCount === 1 ? 'league' : 'leagues'}</span>`,
                ].filter(Boolean).join(' <span class="sep">·</span> ');
                return `<div class="v7-card v7a-card">
                    <div class="v7-avatar-wrap">${avatar}${dot}</div>
                    <div class="v7-info">
                        <div class="v7-name-line">
                            ${flagImg('v7-flag', p.flagCode)}
                            <span class="v7-name">${nameLink(p, opts)}</span>
                            ${p.titles.map(titleChip).join('')}
                        </div>
                        <div class="v7-meta">${meta}</div>
                    </div>
                </div>`;
            },

            v8(p, opts = {}) {
                const photo = p.photoPath
                    ? `<img class="v8-photo-img" src="${escapeHtml(p.photoPath)}" alt="${escapeHtml(p.name)}">`
                    : `<div class="v8-photo">${escapeHtml(p.initials)}</div>`;
                /* Every title gets its own full-width ribbon, stacked
                   one below the next. All ribbons share the same
                   gold/silver/bronze gradient styling driven by their
                   tier — no mixed "ribbon + small chip" treatment. */
                const ribbons = p.titles.map(t =>
                    `<div class="v8-ribbon pl-tier-${t.tier}" title="${escapeHtml(t.tooltip)}">${t.icon} ${escapeHtml(t.label)}</div>`
                ).join('');
                const statusLabel = p.statusKind === 'green' ? 'Active' : p.statusKind === 'orange' ? 'This year' : 'Inactive';
                const meta = [
                    `<span class="v8-status-text"><span class="pl-status-dot ${p.statusDotClass}" title="${escapeHtml(p.statusDotTitle)}"></span> ${statusLabel}</span>`,
                    !opts.inLeague && p.joinedFormatted && `Joined ${escapeHtml(p.joinedFormatted)}`,
                    !opts.inLeague && `<span class="v8-leagues">${p.leagueCount} ${p.leagueCount === 1 ? 'league' : 'leagues'}</span>`,
                ].filter(Boolean).join(' <span class="sep">·</span> ');
                const layers = watermarkLayers(p.titles);
                const watermark = layers.map(l =>
                    `<div class="pl-watermark-glyph v8-watermark role-${l.role} pl-wm-${l.tier}">${l.icon}</div>`
                ).join('');
                const ct = cardTier(layers);
                const cardTierCls = ct ? ` pl-card-${ct}` : '';
                return `<div class="v8-card${cardTierCls}">
                    ${watermark}
                    ${ribbons}
                    <div class="v8-body">
                        <div class="v8-photo-wrap">
                            ${photo}
                            <img class="v8-photo-flag" src="${flagUrl(p.flagCode)}" alt="${escapeHtml(p.flagCode)}" title="${escapeHtml(p.flagCode)}">
                        </div>
                        <div class="v8-main">
                            <h3 class="v8-name">${nameLink(p, opts)}</h3>
                            ${p.fullName ? `<div class="v8-realname">${escapeHtml(p.fullName)}</div>` : ''}
                        </div>
                    </div>
                    <div class="v8-meta">${meta}</div>
                </div>`;
            },

            v9(p, opts = {}) {
                const avatar = p.photoPath
                    ? `<img class="v9-avatar-img" src="${escapeHtml(p.photoPath)}" alt="${escapeHtml(p.name)}">`
                    : `<div class="v9-avatar">${escapeHtml(p.initials)}</div>`;
                const titleRows = p.titles.map(t =>
                    `<div class="v9-title-row pl-tier-${t.tier}" title="${escapeHtml(t.tooltip)}"><span class="icon">${t.icon}</span>${escapeHtml(t.label)}</div>`
                ).join('');
                const statBlock = opts.inLeague ? '' : `<div class="v9-right">
                        <div class="v9-stat"><span class="v9-stat-num">${p.leagueCount}</span><span class="v9-stat-lbl">Leagues</span></div>
                        ${p.joinedFormatted ? `<div class="v9-stat"><span class="v9-stat-num">${escapeHtml(p.joinedFormatted)}</span><span class="v9-stat-lbl">Joined</span></div>` : ''}
                    </div>`;
                const layers = watermarkLayers(p.titles);
                const watermark = layers.map(l =>
                    `<div class="pl-watermark-glyph v9-watermark role-${l.role} pl-wm-${l.tier}">${l.icon}</div>`
                ).join('');
                const ct = cardTier(layers);
                const cardTierCls = ct ? ` pl-card-${ct}` : '';
                return `<div class="v9-tile${cardTierCls}">
                    ${watermark}
                    <div class="v9-left">
                        ${avatar}
                        <div>
                            <div class="v9-name-row">
                                <span class="v9-name">${nameLink(p, opts)}</span>
                                <span class="pl-status-dot ${p.statusDotClass}" title="${escapeHtml(p.statusDotTitle)}" style="width:0.5em;height:0.5em"></span>
                                ${flagImg('v9-flag', p.flagCode)}
                            </div>
                            ${p.fullName ? `<div class="v9-fullname">${escapeHtml(p.fullName)}</div>` : ''}
                        </div>
                    </div>
                    <div class="v9-center">${titleRows}</div>
                    ${statBlock}
                </div>`;
            },

            v10(p, opts = {}) {
                const layers = watermarkLayers(p.titles);
                const watermark = layers.map(l =>
                    `<div class="pl-watermark-glyph v10-piece role-${l.role} pl-wm-${l.tier}">${l.icon}</div>`
                ).join('');
                const ct = cardTier(layers);
                const cardTierCls = ct ? ` pl-card-${ct}` : '';
                const titles = p.titles.length
                    ? `<div class="v10-titles">${p.titles.map(t =>
                        `<div class="v10-title-line pl-tier-${t.tier}" title="${escapeHtml(t.tooltip)}"><span class="v10-title-icon">${t.icon}</span>${escapeHtml(t.label)}</div>`
                      ).join('')}</div>`
                    : '';
                const statusLabel = p.statusKind === 'green' ? 'Active' : p.statusKind === 'orange' ? 'This year' : 'Inactive';
                const statusColor = p.statusKind === 'green' ? '#2ecc40' : p.statusKind === 'orange' ? '#f59e0b' : '#9ca3af';
                const avatar = p.photoPath
                    ? `<img class="v10-avatar-img" src="${escapeHtml(p.photoPath)}" alt="${escapeHtml(p.name)}">`
                    : `<div class="v10-avatar">${escapeHtml(p.initials)}</div>`;
                const foot = opts.inLeague ? '' : `<div class="v10-foot">
                            ${p.joinedFormatted ? `<span>Joined ${escapeHtml(p.joinedFormatted)}</span>` : '<span></span>'}
                            <span class="v10-leagues">${p.leagueCount} ${p.leagueCount === 1 ? 'League' : 'Leagues'}</span>
                        </div>`;
                return `<div class="v10-card${cardTierCls}">
                    ${watermark}
                    <img class="v10-flag-corner" src="${flagUrl(p.flagCode)}" alt="${escapeHtml(p.flagCode)}" title="${escapeHtml(p.flagCode)}">
                    <div class="v10-content">
                        ${avatar}
                        <div class="v10-status" style="color:${statusColor}">
                            <span class="pl-status-dot ${p.statusDotClass}" style="width:0.45em;height:0.45em"></span> ${statusLabel}
                        </div>
                        ${titles}
                        <div class="v10-name">${nameLink(p, opts)}</div>
                        ${p.fullName ? `<div class="v10-fullname">${escapeHtml(p.fullName)}</div>` : ''}
                        ${foot}
                    </div>
                </div>`;
            },

            v11(p, opts = {}) {
                const meta = [
                    p.fullName && escapeHtml(p.fullName),
                    !opts.inLeague && p.joinedFormatted && `Joined ${escapeHtml(p.joinedFormatted)}`,
                    !opts.inLeague && `<span class="v11-leagues">${p.leagueCount} ${p.leagueCount === 1 ? 'league' : 'leagues'}</span>`,
                ].filter(Boolean);
                return `<div class="v11-line">
                    <span class="pl-status-dot ${p.statusDotClass}" title="${escapeHtml(p.statusDotTitle)}"></span>
                    <div class="v11-avatar">${escapeHtml(p.initials)}</div>
                    ${flagImg('v11-flag', p.flagCode)}
                    <span class="v11-name">${nameLink(p, opts)}</span>
                    ${p.titles.map(titleChip).join('')}
                    ${meta.map(m => `<span class="v11-sep">·</span><span class="v11-meta">${m}</span>`).join('')}
                </div>`;
            },

            v12(p, opts = {}) {
                /* All titles in V12 render in the same Bebas-Neue
                   ribbon — same size, same shape — and the
                   tier-driven gradient (gold / silver / bronze /
                   white) gives each ribbon its own colour. */
                const ribbons = p.titles.map(t =>
                    `<span class="v12-titleribbon pl-tier-${t.tier}" title="${escapeHtml(t.tooltip)}"><span class="v12-titleicon">${t.icon}</span> ${escapeHtml(t.label.toUpperCase())}</span>`
                ).join('');
                const titlesBlock = ribbons
                    ? `<div class="v12-titles-row">${ribbons}</div>`
                    : '<span></span>';
                const statusCls = p.statusKind === 'green' ? '' : p.statusKind;
                const statusLabel = p.statusKind === 'green' ? 'Active' : p.statusKind === 'orange' ? 'This year' : 'Inactive';
                const photo = p.photoPath
                    ? `<img class="v12-photo-img" src="${escapeHtml(p.photoPath)}" alt="${escapeHtml(p.name)}">`
                    : `<div class="v12-photo">${escapeHtml(p.initials)}</div>`;
                const statGrid = opts.inLeague ? '' : `<div class="v12-statgrid">
                        ${p.joinedFormatted ? `<div class="v12-stat"><div class="v12-statlbl">Joined</div><div class="v12-statnum">${escapeHtml(p.joinedFormatted)}</div></div>` : '<div></div>'}
                        <div class="v12-stat"><div class="v12-statlbl">Leagues</div><div class="v12-statnum">${p.leagueCount}</div></div>
                    </div>`;
                const layers = watermarkLayers(p.titles);
                const watermark = layers.map(l =>
                    `<div class="pl-watermark-glyph v12-watermark role-${l.role} pl-wm-${l.tier}">${l.icon}</div>`
                ).join('');
                const ct = cardTier(layers);
                const cardTierCls = ct ? ` pl-card-${ct}` : '';
                return `<div class="v12-hero${cardTierCls}">
                    ${watermark}
                    <div class="v12-top">
                        ${titlesBlock}
                        <span class="v12-statuschip ${statusCls}" title="${escapeHtml(p.statusDotTitle)}">
                            <span class="dot"></span>${statusLabel}
                        </span>
                    </div>
                    <div class="v12-bodyrow">
                        ${photo}
                        <div>
                            <h3 class="v12-display">${flagImg('v12-flag', p.flagCode)} ${nameLink(p, opts)}</h3>
                            ${p.fullName ? `<div class="v12-real">${escapeHtml(p.fullName)}</div>` : ''}
                        </div>
                    </div>
                    ${statGrid}
                </div>`;
            },
        };

        /* ── League header data helper ──────────────────────────────
           Pulls everything a league-header variant needs (title, type,
           status, start date, last-updated) from the league's params +
           CSV Last-Modified header. */
        function formatStartDate(iso) {
            if (!iso) return '';
            const m = String(iso).match(/^(\d{4})-(\d{2})(?:-(\d{2}))?/);
            if (!m) return iso;
            const year = parseInt(m[1], 10);
            const month = parseInt(m[2], 10);
            const day = m[3] ? parseInt(m[3], 10) : null;
            const mn = MONTHS_LONG[month - 1]?.slice(0, 3) || '';
            return day ? `${day} ${mn} ${year}` : `${mn} ${year}`;
        }
        function formatLastUpdated(headerVal) {
            if (!headerVal) return '';
            const d = new Date(headerVal);
            if (isNaN(d)) return headerVal;
            const date = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
            const time = d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
            return `${date}, ${time}`;
        }

        async function computeLabLeague(leagueId) {
            if (!leagueId) return null;
            try {
                const { params, lastModified } = await loadLeague(leagueId);
                const type = params.LeagueType || 'doubling';
                return {
                    name: params.LeagueTitle || leagueId,
                    type,
                    typeLabel: LEAGUE_TYPE_LABELS[type] || type,
                    running: !!params.Running,
                    statusLabel: params.Running ? 'Running' : 'Completed',
                    startDate: formatStartDate(params.IssueDate || ''),
                    lastUpdated: formatLastUpdated(lastModified),
                };
            } catch { return null; }
        }

        /* ── League-header renderers (V13–V17) ────────────────────── */
        function typePill(l) {
            return `<span class="league-type-pill type-${l.type}">${escapeHtml(l.typeLabel)}</span>`;
        }
        function statusPill(l) {
            const cls = l.running ? 'status-running' : 'status-completed';
            return `<span class="status-pill ${cls}"><span class="dot"></span>${escapeHtml(l.statusLabel)}</span>`;
        }

        /* LEAGUE_HEADER_RENDERERS also take an optional `opts`.
           opts.omitStartDate=true hides the "Started …" field — that's
           the case when the variant runs above the league-table page
           (table D), since "Last updated" already implies the league
           has started. The dashboard variant always shows both dates. */
        const LEAGUE_HEADER_RENDERERS = {
            v13(l, opts = {}) {
                const items = [];
                if (!opts.omitStartDate) items.push(`Started ${escapeHtml(l.startDate)}`);
                items.push(`Last updated ${escapeHtml(l.lastUpdated)}`);
                const meta = items.join(' <span class="sep">·</span> ');
                return `<div class="lh13-card">
                    <div class="lh13-name-line">
                        <span class="lh13-name">${escapeHtml(l.name)}</span>
                        ${typePill(l)}
                        ${statusPill(l)}
                    </div>
                    <div class="lh13-meta">${meta}</div>
                </div>`;
            },
            v14(l, opts = {}) {
                const startedChip = opts.omitStartDate ? '' :
                    `<span class="lh14-chip"><span class="ico">📅</span> Started <strong>${escapeHtml(l.startDate)}</strong></span>`;
                return `<div class="lh14-card">
                    <div class="lh14-row1">
                        <h3 class="lh14-name">${escapeHtml(l.name)}</h3>
                        ${statusPill(l)}
                    </div>
                    <div class="lh14-row2">
                        ${typePill(l)}
                        ${startedChip}
                        <span class="lh14-chip"><span class="ico">🕒</span> Updated <strong>${escapeHtml(l.lastUpdated)}</strong></span>
                    </div>
                </div>`;
            },
            v15(l, opts = {}) {
                const startRow = opts.omitStartDate ? '' :
                    `<dt>Start date</dt><dd>${escapeHtml(l.startDate)}</dd>`;
                return `<div class="lh15-card">
                    <div class="lh15-ribbon">${escapeHtml(l.name)}</div>
                    <dl class="lh15-grid">
                        <dt>Type</dt><dd>${typePill(l)}</dd>
                        <dt>Status</dt><dd>${statusPill(l)}</dd>
                        ${startRow}
                        <dt>Last updated</dt><dd>${escapeHtml(l.lastUpdated)}</dd>
                    </dl>
                </div>`;
            },
            v16(l, opts = {}) {
                // When start date is omitted, render a single-column grid so the
                // Last Updated tile stretches across the full width instead of
                // floating alone on the left.
                const startTile = opts.omitStartDate ? '' :
                    `<div><div class="lh16-statlbl">Start Date</div><div class="lh16-statval">${escapeHtml(l.startDate)}</div></div>`;
                const gridStyle = opts.omitStartDate ? ' style="grid-template-columns:1fr"' : '';
                return `<div class="lh16-hero">
                    <div class="lh16-top">
                        ${typePill(l)}
                        ${statusPill(l)}
                    </div>
                    <h2 class="lh16-display">${escapeHtml(l.name)}</h2>
                    <div class="lh16-statgrid"${gridStyle}>
                        ${startTile}
                        <div><div class="lh16-statlbl">Last Updated</div><div class="lh16-statval">${escapeHtml(l.lastUpdated)}</div></div>
                    </div>
                </div>`;
            },
            v17(l, opts = {}) {
                const startedSpan = opts.omitStartDate ? '' : `
                    <span class="lh17-sep">·</span>
                    <span class="lh17-meta"><span class="label">Started</span>${escapeHtml(l.startDate)}</span>`;
                return `<div class="lh17-line">
                    ${typePill(l)}
                    <span class="lh17-name">${escapeHtml(l.name)}</span>
                    ${statusPill(l)}
                    ${startedSpan}
                    <span class="lh17-sep">·</span>
                    <span class="lh17-meta"><span class="label">Updated</span>${escapeHtml(l.lastUpdated)}</span>
                </div>`;
            },
        };

        /* ── Lab state + DOM helpers ──────────────────────────────── */
        let labPlayer = null;
        let labLeague = null;
        let currentView = 'player-general';
        let currentPlayerName = new URLSearchParams(window.location.search).get('player') || DEFAULT_PLAYER;
        let currentLeagueId   = new URLSearchParams(window.location.search).get('league') || '';

        /* Header font-size scale state — one independent level per header
           dropdown. Level 4 is the production baseline (factor 1.0); 5 is
           the largest. Factor multiplies the variant card's root
           font-size via the `--pl-scale` CSS variable, so every em-based
           child element inside scales proportionally. */
        const SCALE_FACTORS = [0.7, 0.8, 0.9, 1.0, 1.15];
        const HEADER_SCALES = { pg: 4, pl: 4, lhDash: 4, lhTable: 4 };
        function scaleFactor(key) { return SCALE_FACTORS[HEADER_SCALES[key] - 1]; }

        function getNavKey()    { return document.getElementById('pl-nav-select')?.value    || 'current'; }
        function getPlayerGeneralHeaderKey() { return document.getElementById('pl-header-pg-select')?.value || 'current'; }
        function getPlayerLeagueHeaderKey()  { return document.getElementById('pl-header-pl-select')?.value || 'current'; }
        function getLeagueDashHeaderKey()    { return document.getElementById('pl-lh-dash-select')?.value   || 'current'; }
        function getLeagueTableHeaderKey()   { return document.getElementById('pl-lh-table-select')?.value  || 'current'; }
        function getTiKey()     { return document.getElementById('pl-ti-select')?.value     || 'none'; }

        /* Capture the badge's original data (tier / kind / code /
           tooltip) the first time we touch it, so we can later
           re-style it for any option — or restore the production
           look when the user picks "Off". */
        function snapshotBadge(span) {
            if (span.dataset.tiSnapshot) return;
            const tierClass = Array.from(span.classList)
                .find(c => /^title-abbr-(gold|silver|bronze|white)$/.test(c)) || 'title-abbr-white';
            span.dataset.tiTier = tierClass.replace('title-abbr-', '');
            span.dataset.tiKind = span.classList.contains('title-abbr-champ') ? 'champ' : 'bmab';
            span.dataset.tiCode = span.textContent.trim();
            span.dataset.tiTip  = span.getAttribute('title') || '';
            span.dataset.tiSnapshot = '1';
        }

        /* Apply the picked option to a single badge in-place. */
        function styleBadge(span, opt) {
            snapshotBadge(span);
            const { tiTier: tier, tiKind: kind, tiCode: code, tiTip: tip } = span.dataset;

            if (opt === 'none') {
                // Restore the original production look on this badge.
                span.className = `title-abbr title-abbr-${tier}${kind === 'champ' ? ' title-abbr-champ' : ''}`;
                span.textContent = code;
                if (tip) span.setAttribute('title', tip); else span.removeAttribute('title');
                return;
            }

            // Option G is a mix:
            //   championship → F (gradient pill, bold)
            //   BMAB         → B (outlined pill, bold)
            // Both styles render the caption inside <b> for emphasis.
            let effOpt = opt;
            let bold   = (opt === 'f');
            if (opt === 'g') {
                effOpt = (kind === 'champ') ? 'f' : 'b';
                bold   = true;
            }

            // `pl-ti` carries the shared sizing / spacing / vertical-
            // alignment rules; the option-specific classes carry the
            // visual style.
            span.className = `pl-ti ti-${effOpt} ti-${effOpt}-${tier}`;
            if (effOpt === 'c') {
                span.textContent = '';
            } else if (bold) {
                span.innerHTML = `<b>${escapeHtml(code)}</b>`;
            } else {
                span.textContent = code;
            }
            if (tip) span.setAttribute('title', tip);
        }

        /* Walks every title badge currently on the page (production
           originals plus any we've already re-styled) and applies the
           current dropdown selection. Safe to call as many times as
           we like — snapshot data persists. */
        function applyTitleIconVariant() {
            const opt = getTiKey();
            document.querySelectorAll('.title-abbr, [data-ti-snapshot]')
                .forEach(span => styleBadge(span, opt));
        }

        function applyNavVariant() {
            const container = document.querySelector('.page-container');
            if (!container) return;
            const prodBreadcrumb = container.querySelector('.breadcrumbs');
            container.querySelectorAll('.pl-nav-variant').forEach(el => el.remove());

            const key = getNavKey();
            if (key === 'current') {
                if (prodBreadcrumb) prodBreadcrumb.style.display = '';
            } else if (labPlayer) {
                if (prodBreadcrumb) prodBreadcrumb.style.display = 'none';
                const variant = document.createElement('div');
                variant.className = 'pl-nav-variant';
                variant.innerHTML = NAV_RENDERERS[key](labPlayer);
                container.insertBefore(variant, container.firstChild);
            }
        }

        function applyHeaderVariant() {
            // Active for both the general player card (player-general) and
            // the per-league player card (view=player). Each context picks
            // from its own dropdown; opts.inLeague flags the in-league one
            // so renderers drop Joined / N-leagues meta.
            if (currentView !== 'player-general' && currentView !== 'player') return;
            const pageHeader = document.querySelector('.page-header');
            if (!pageHeader) return;
            const h1 = document.getElementById('page-title');
            pageHeader.querySelectorAll('.pl-header-variant').forEach(el => el.remove());

            const inLeague = currentView === 'player';
            const key = inLeague ? getPlayerLeagueHeaderKey() : getPlayerGeneralHeaderKey();
            if (key === 'current') {
                if (h1) h1.style.display = '';
            } else if (labPlayer && HEADER_RENDERERS[key]) {
                if (h1) h1.style.display = 'none';
                const variant = document.createElement('div');
                variant.className = 'pl-header-variant';
                variant.style.setProperty('--pl-scale', scaleFactor(inLeague ? 'pl' : 'pg'));
                variant.innerHTML = HEADER_RENDERERS[key](labPlayer, { inLeague });
                pageHeader.insertBefore(variant, h1);
            }
        }

        function applyLeagueHeaderVariant() {
            // Active for both the league dashboard (view=dashboard) and the
            // league table page (view=league). Each picks from its own
            // dropdown; opts.omitStartDate=true for the table-D page so
            // the "Started …" field is dropped.
            if (currentView !== 'league' && currentView !== 'dashboard') return;
            const pageHeader = document.querySelector('.page-header');
            if (!pageHeader) return;
            const h1 = document.getElementById('page-title');
            pageHeader.querySelectorAll('.pl-league-variant').forEach(el => el.remove());

            const omitStartDate = currentView === 'league';
            const key = omitStartDate ? getLeagueTableHeaderKey() : getLeagueDashHeaderKey();
            if (key === 'current') {
                if (h1) h1.style.display = '';
                pageHeader.querySelectorAll('.last-updated, .games-played').forEach(el => el.style.display = '');
            } else if (labLeague && LEAGUE_HEADER_RENDERERS[key]) {
                if (h1) h1.style.display = 'none';
                // .league-nav (prev/next arrows on dashboard) stays visible — it's
                // navigation, not part of the header. The .league-nav margin-top
                // in dashboard.css already gives it breathing room below the variant.
                pageHeader.querySelectorAll('.last-updated, .games-played').forEach(el => el.style.display = 'none');
                const variant = document.createElement('div');
                variant.className = 'pl-league-variant';
                variant.style.setProperty('--pl-scale', scaleFactor(omitStartDate ? 'lhTable' : 'lhDash'));
                variant.innerHTML = LEAGUE_HEADER_RENDERERS[key](labLeague, { omitStartDate });
                pageHeader.insertBefore(variant, h1);
            }
        }

        /* ── Reset DOM between views ──────────────────────────────── */
        function resetPageDom() {
            document.querySelectorAll('.pl-header-variant, .pl-nav-variant, .pl-league-variant').forEach(el => el.remove());

            const ph = document.getElementById('page-header');
            if (ph) {
                ph.classList.remove('landing-header', 'editable');
                ph.style.display = '';
            }
            ['site-logo', 'site-title', 'site-subtitle'].forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                el.style.display = 'none';
                if (el.tagName === 'IMG') el.removeAttribute('src');
                else el.textContent = '';
            });
            const h1 = document.getElementById('page-title');
            if (h1) { h1.textContent = 'Loading…'; h1.style.display = ''; h1.className = ''; }
            const sub = document.getElementById('league-subtitle');
            if (sub) { sub.textContent = ''; sub.style.display = ''; }
            const pc = document.querySelector('.page-container');
            if (pc) pc.classList.remove('wide-table');
            const content = document.getElementById('content');
            if (content) content.innerHTML = '<div class="loading">Loading…</div>';

            // Strip any prior league-page extras attached to .page-header.
            // .league-nav is included so prev/next arrows from the player
            // view (table E) or dashboard view don't survive a switch to
            // player-general (which has no equivalent in production).
            document.querySelectorAll('.page-header .last-updated, .page-header .games-played, .page-header .league-nav').forEach(el => {
                if (el.id !== 'league-subtitle') el.remove();
            });
        }

        /* ── Update the "viewing X" subtitle in the lab strip ─────── */
        function updateViewingLabel() {
            const viewing = document.getElementById('pl-viewing');
            if (!viewing) return;
            if (currentView === 'home')          viewing.textContent = 'Home';
            else if (currentView === 'league')   viewing.textContent = `League · ${currentLeagueId || '—'}`;
            else if (currentView === 'dashboard') viewing.textContent = `Dashboard · ${currentLeagueId || '—'}`;
            else if (currentView === 'player')   viewing.textContent = `${currentPlayerName} · ${currentLeagueId || '—'}`;
            else                                 viewing.textContent = currentPlayerName;
        }

        /* ── Render the current view (sync URL → DOM → render) ────── */
        async function loadView() {
            resetPageDom();
            updateViewingLabel();
            clearPlayersMetadataCache();

            try {
                if (currentView === 'home') {
                    // Landing page needs the site-* heading elements visible
                    ['site-logo', 'site-title', 'site-subtitle'].forEach(id => {
                        const el = document.getElementById(id);
                        if (el) el.style.display = '';
                    });
                    const h1 = document.getElementById('page-title');
                    if (h1) h1.style.display = 'none';
                    const sub = document.getElementById('league-subtitle');
                    if (sub) sub.style.display = 'none';
                    await renderLandingPage();
                } else if (currentView === 'league') {
                    const [, leagueData] = await Promise.all([
                        renderLeaguePage(),
                        computeLabLeague(currentLeagueId),
                    ]);
                    labLeague = leagueData;
                    applyLeagueHeaderVariant();
                } else if (currentView === 'dashboard') {
                    const [, leagueData] = await Promise.all([
                        renderDashboardPage(),
                        computeLabLeague(currentLeagueId),
                    ]);
                    labLeague = leagueData;
                    applyLeagueHeaderVariant();
                } else if (currentView === 'player') {
                    const [, labData] = await Promise.all([
                        renderPlayerPage(),
                        computeLabPlayer(currentPlayerName),
                    ]);
                    labPlayer = labData;
                    applyNavVariant();
                    applyHeaderVariant();
                    applyTitleIconVariant();
                } else {
                    // player-general (default)
                    const [labData] = await Promise.all([
                        computeLabPlayer(currentPlayerName),
                        renderPlayerGeneralPage(),
                    ]);
                    labPlayer = labData;
                    applyNavVariant();
                    applyHeaderVariant();
                    applyTitleIconVariant();
                }
            } catch (err) {
                console.error('Failed to load view:', err);
                const content = document.getElementById('content');
                if (content) content.innerHTML = `<div class="error">Failed to load: ${escapeHtml(err.message)}</div>`;
            }
        }

        async function loadPlayer(playerName) {
            currentPlayerName = playerName;
            currentView = 'player-general';
            const url = new URL(window.location.href);
            url.searchParams.set('view', currentView);
            url.searchParams.set('player', playerName);
            url.searchParams.delete('league');
            window.history.replaceState(null, '', url.toString());
            await loadView();
        }

        /* ── Click interception: rewrite production-page links to
           keep the lab strip visible across navigation. ──────────── */
        function rewriteToLab(rawHref) {
            try {
                const u = new URL(rawHref, window.location.href);
                if (u.origin !== window.location.origin) return null;
                const file = u.pathname.split('/').pop();
                const out = new URL(window.location.href);
                out.search = '';
                if (file === 'index.html' || file === '' || file === '/') {
                    out.searchParams.set('view', 'home');
                } else if (file === 'league_table.html') {
                    out.searchParams.set('view', 'league');
                    if (u.searchParams.get('league')) out.searchParams.set('league', u.searchParams.get('league'));
                } else if (file === 'league.html') {
                    out.searchParams.set('view', 'dashboard');
                    if (u.searchParams.get('league')) out.searchParams.set('league', u.searchParams.get('league'));
                } else if (file === 'player_league.html') {
                    out.searchParams.set('view', 'player');
                    if (u.searchParams.get('league')) out.searchParams.set('league', u.searchParams.get('league'));
                    if (u.searchParams.get('player')) out.searchParams.set('player', u.searchParams.get('player'));
                } else if (file === 'player.html') {
                    out.searchParams.set('view', 'player-general');
                    if (u.searchParams.get('player')) out.searchParams.set('player', u.searchParams.get('player'));
                } else {
                    return null;
                }
                return out.toString();
            } catch { return null; }
        }

        async function navigateTo(href) {
            const u = new URL(href, window.location.href);
            const view = u.searchParams.get('view') || 'player-general';
            currentView         = view;
            currentLeagueId     = u.searchParams.get('league') || '';
            currentPlayerName   = u.searchParams.get('player') || (view === 'player-general' ? DEFAULT_PLAYER : '');
            window.history.pushState(null, '', u.toString());
            await loadView();
        }

        function setupSearchInterception() {
            document.addEventListener('click', (e) => {
                const link = e.target.closest('a[href]');
                if (!link) return;
                if (e.defaultPrevented) return;
                if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.button !== 0) return;
                if (link.target && link.target !== '' && link.target !== '_self') return;
                const rewritten = rewriteToLab(link.href);
                if (!rewritten) return;
                e.preventDefault();
                // Close the nav-search dropdown if the click came from there
                const results = document.querySelector('.nav-search-results');
                const input   = document.querySelector('.nav-search input');
                if (link.closest('.nav-search-results')) {
                    if (results) results.hidden = true;
                    if (input)   input.value = '';
                }
                navigateTo(rewritten);
            }, true);

            window.addEventListener('popstate', () => {
                const u = new URL(window.location.href);
                currentView       = u.searchParams.get('view') || 'player-general';
                currentLeagueId   = u.searchParams.get('league') || '';
                currentPlayerName = u.searchParams.get('player') || (currentView === 'player-general' ? DEFAULT_PLAYER : '');
                loadView();
            });
        }

        function buildLabStrip() {

            strip.id = 'design-lab-strip';

                    <div class="pl-fields">

                                <option value="league">League table</option>
                                <option value="dashboard">League dashboard</option>
                                <option value="player">Player (per-league)</option>
                                <option value="player-general">Player General</option>
                            </select>
                        </div>

                                <option value="v6">V6 — Transfermarkt</option>
                            </select>
                        </div>
                        <div class="pl-field">
                            <label for="pl-header-pg-select">Player Header — General card</label>
                            <div class="pl-field-controls">
                                <select id="pl-header-pg-select">
                                    <option value="current">Current — production</option>
                                    <option value="v7">V7 — Lichess-enriched</option>
                                    <option value="v8">V8 — FIDE passport</option>
                                    <option value="v9">V9 — Glassmorphism tile</option>
                                    <option value="v10">V10 — Trading card</option>
                                    <option value="v11">V11 — Minimal single-line</option>
                                    <option value="v12" selected>V12 — Hero banner</option>
                                </select>
                                <span class="pl-scale" data-pl-scale-target="pg" title="Adjust header font size (level 4 = current)">
                                    <button class="pl-scale-btn pl-scale-minus" type="button" aria-label="Decrease font size">−</button>
                                    <span class="pl-scale-val">4</span>
                                    <button class="pl-scale-btn pl-scale-plus" type="button" aria-label="Increase font size">+</button>
                                </span>
                            </div>
                        </div>
                        <div class="pl-field">
                            <label for="pl-header-pl-select">Player Header — In-league card (table E)</label>
                            <div class="pl-field-controls">
                                <select id="pl-header-pl-select">
                                    <option value="current">Current — production</option>
                                    <option value="v7">V7 — Lichess-enriched</option>
                                    <option value="v7a" selected>V7a — Lichess-enriched (square photo)</option>
                                    <option value="v8">V8 — FIDE passport</option>
                                    <option value="v9">V9 — Glassmorphism tile</option>
                                    <option value="v10">V10 — Trading card</option>
                                    <option value="v11">V11 — Minimal single-line</option>
                                    <option value="v12">V12 — Hero banner</option>
                                </select>
                                <span class="pl-scale" data-pl-scale-target="pl" title="Adjust header font size (level 4 = current)">
                                    <button class="pl-scale-btn pl-scale-minus" type="button" aria-label="Decrease font size">−</button>
                                    <span class="pl-scale-val">4</span>
                                    <button class="pl-scale-btn pl-scale-plus" type="button" aria-label="Increase font size">+</button>
                                </span>
                            </div>
                        </div>
                        <div class="pl-field">
                            <label for="pl-lh-dash-select">League Header — Dashboard</label>
                            <div class="pl-field-controls">
                                <select id="pl-lh-dash-select">
                                    <option value="current">Current — production</option>
                                    <option value="v13">V13 — Lichess title bar</option>
                                    <option value="v14">V14 — Stacked card + chip row</option>
                                    <option value="v15">V15 — FIDE passport</option>
                                    <option value="v16" selected>V16 — Hero banner</option>
                                    <option value="v17">V17 — Minimal capsule</option>
                                </select>
                                <span class="pl-scale" data-pl-scale-target="lhDash" title="Adjust header font size (level 4 = current)">
                                    <button class="pl-scale-btn pl-scale-minus" type="button" aria-label="Decrease font size">−</button>
                                    <span class="pl-scale-val">4</span>
                                    <button class="pl-scale-btn pl-scale-plus" type="button" aria-label="Increase font size">+</button>

                            </div>
                        </div>
                        <div class="pl-field">
                            <label for="pl-lh-table-select">League Header — Table page (table D)</label>
                            <div class="pl-field-controls">
                                <select id="pl-lh-table-select">
                                    <option value="current">Current — production</option>
                                    <option value="v13" selected>V13 — Lichess title bar</option>
                                    <option value="v14">V14 — Stacked card + chip row</option>
                                    <option value="v15">V15 — FIDE passport</option>
                                    <option value="v16">V16 — Hero banner</option>
                                    <option value="v17">V17 — Minimal capsule</option>
                                </select>
                                <span class="pl-scale" data-pl-scale-target="lhTable" title="Adjust header font size (level 4 = current)">
                                    <button class="pl-scale-btn pl-scale-minus" type="button" aria-label="Decrease font size">−</button>
                                    <span class="pl-scale-val">4</span>
                                    <button class="pl-scale-btn pl-scale-plus" type="button" aria-label="Increase font size">+</button>
                                </span>
                            </div>
                        </div>
                        <div class="pl-field">
                            <label for="pl-ti-select">Title icon (tables)</label>
                            <select id="pl-ti-select">
                                <option value="none">Off — production badges</option>
                                <option value="a">A — Solid pill</option>
                                <option value="b">B — Outlined pill</option>
                                <option value="c">C — Colored dot</option>
                                <option value="d">D — Hexagon badge</option>
                                <option value="e">E — Letter in circle</option>
                                <option value="f">F — Gradient pill (bold)</option>
                                <option value="g">G — Mix · champ → F, BMAB → B (bold)</option>

                        </div>
                    </div>
                </div>
            `;
            const nav = document.querySelector('.site-nav');
            if (nav) nav.insertAdjacentElement('afterend', strip);
            else     document.body.insertBefore(strip, document.body.firstChild);

            document.getElementById('pl-view-select').value = currentView;
            document.getElementById('pl-view-select').addEventListener('change', async (e) => {
                const v = e.target.value;
                const out = new URL(window.location.href);
                out.searchParams.set('view', v);
                // Default placeholders so league/player views still render something useful
                if ((v === 'league' || v === 'dashboard') && !out.searchParams.get('league')) {
                    try {
                        const order = await loadLeagueOrder();
                        const first = (order && order[0]) ? order[0].replace(' - ', ' ') : '';
                        if (first) out.searchParams.set('league', first);
                    } catch {}
                }
                if (v === 'player' && !out.searchParams.get('player')) {
                    out.searchParams.set('player', DEFAULT_PLAYER);
                }
                if (v === 'player-general' && !out.searchParams.get('player')) {
                    out.searchParams.set('player', DEFAULT_PLAYER);
                }
                navigateTo(out.toString());
            });
            document.getElementById('pl-nav-select').addEventListener('change', applyNavVariant);
            document.getElementById('pl-header-pg-select').addEventListener('change', applyHeaderVariant);
            document.getElementById('pl-header-pl-select').addEventListener('change', applyHeaderVariant);
            document.getElementById('pl-lh-dash-select').addEventListener('change', applyLeagueHeaderVariant);
            document.getElementById('pl-lh-table-select').addEventListener('change', applyLeagueHeaderVariant);
            document.getElementById('pl-ti-select').addEventListener('change', applyTitleIconVariant);

            /* ── Scale controls — five-level +/- per header type ─────
               Each control owns one entry in HEADER_SCALES. Bumping a
               level updates the displayed number, toggles button enabled
               state at the bounds, and re-applies the matching header
               renderer so the CSS variable refreshes on the variant. */
            document.querySelectorAll('.pl-scale[data-pl-scale-target]').forEach(wrap => {
                const key = wrap.dataset.plScaleTarget;
                const valEl = wrap.querySelector('.pl-scale-val');
                const minus = wrap.querySelector('.pl-scale-minus');
                const plus  = wrap.querySelector('.pl-scale-plus');
                const isLeagueHeader = (key === 'lhDash' || key === 'lhTable');
                const apply = isLeagueHeader ? applyLeagueHeaderVariant : applyHeaderVariant;
                function refresh() {
                    valEl.textContent = String(HEADER_SCALES[key]);
                    minus.disabled = HEADER_SCALES[key] <= 1;
                    plus.disabled  = HEADER_SCALES[key] >= SCALE_FACTORS.length;
                }
                minus.addEventListener('click', () => {
                    if (HEADER_SCALES[key] > 1) { HEADER_SCALES[key]--; refresh(); apply(); }
                });
                plus.addEventListener('click', () => {
                    if (HEADER_SCALES[key] < SCALE_FACTORS.length) { HEADER_SCALES[key]++; refresh(); apply(); }
                });
                refresh();
            });
        }

        /* ── Init ─────────────────────────────────────────────────── */
        (function initFromUrl() {
            const u = new URL(window.location.href);
            currentView       = u.searchParams.get('view') || (u.searchParams.get('player') ? 'player-general' : 'home');
            currentLeagueId   = u.searchParams.get('league') || '';
            currentPlayerName = u.searchParams.get('player') || DEFAULT_PLAYER;
            // Persist a normalised URL so future link rewrites work correctly
            u.searchParams.set('view', currentView);
            window.history.replaceState(null, '', u.toString());
        })();

        await initNavBar();
        buildLabStrip();
        setupSearchInterception();
        await loadView();
        initThemePicker();
        initKeyboardShortcuts();
    </script>
