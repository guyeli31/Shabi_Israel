<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin — Shabi Israel</title>
    <link rel="icon" type="image/png" href="assets/favicon-round.png">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/typography-tokens.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/search-overlay.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/theme-picker.css">
    <link rel="stylesheet" href="css/sections.css">
    <link rel="stylesheet" href="css/subtabs.css">
    <link rel="stylesheet" href="css/admin.css">
    <!-- Shared sidebar styles — defines .sidebar-admin-banner used by both
         the public site sidebar and the admin sidebar so the logged-in
         banner reads identical across surfaces. -->
    <link rel="stylesheet" href="css/site-sidebar.css">
    <!-- MF format canon — styles the F5 CSV-import preview table (.mf-wrap); @imports base.css -->
    <link rel="stylesheet" href="table-lab/formats/mf/mf.css">
    <link rel="stylesheet" href="css/typography-overrides.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
      (function(){
        var t=localStorage.getItem('shabi-theme');
        if(t==='modern')t='nature';if(t==='royal')t='vegas';if(t&&t!=='current'){document.documentElement.dataset.theme=t;localStorage.setItem('shabi-theme',t);}
        var c=localStorage.getItem('shabi-custom-vars');
        if(c){try{var v=JSON.parse(c);for(var k in v)document.documentElement.style.setProperty(k,v[k])}catch(e){}}
      })();
    </script>
</head>
<body>
    <a class="skip-link" href="#main">Skip to content</a>
    <div id="app" role="main">
        <div class="loading">Loading...</div>
    </div>
    <script type="module">
        import { initAdminPage, navigateTo, refreshBadge } from './js/admin/render/adminPage.js';
        import { initThemePicker } from './js/render/themePicker.js';
        import { initTooltips } from './js/render/tooltip.js';

        // Lazy-load modules per view
        let leagueManagerModule = null;
        let playerManagerModule = null;

        initAdminPage(async (view, container) => {
            if (view === 'leagues') {
                if (!leagueManagerModule) {
                    leagueManagerModule = await import('./js/admin/leagueManager.js');
                }
                leagueManagerModule.renderLeagueAdmin(container, refreshBadge);
            } else if (view === 'players') {
                if (!playerManagerModule) {
                    playerManagerModule = await import('./js/admin/playerManager.js');
                }
                playerManagerModule.renderPlayerAdmin(container, refreshBadge);
            }
        });

        initThemePicker();
        initTooltips(); // global themed hover tooltip (replaces native [title])
    </script>
</body>
</html>
