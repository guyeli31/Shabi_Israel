<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MF Table Lab</title>
    <!-- Project design tokens -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/typography-tokens.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/themes.css">
    <!-- Shared atoms (Group B): .flag, .medal-*, .title-abbr-* etc.
         Group A table rules in this file are cascade-equal duplicates of mf.css;
         Phase 7 deletes Group A from components.css. -->
    <link rel="stylesheet" href="../css/components.css">
    <!-- Canonical MF table styles (auto-imports formats/_base/base.css) -->
    <link rel="stylesheet" href="./formats/mf/mf.css">
    <!-- Lab UI chrome only -->
    <link rel="stylesheet" href="./lab.css">
    <link rel="stylesheet" href="../css/theme-picker.css">
    <!-- Apply saved theme before first paint -->
    <script>
        (function () {
            var t = localStorage.getItem('shabi-theme');
            if (t === 'modern') t = 'nature';
            if (t === 'royal')  t = 'vegas';
            if (t && t !== 'current') document.documentElement.dataset.theme = t;
            var c = localStorage.getItem('shabi-custom-vars');
            if (c) { try { var v = JSON.parse(c); for (var k in v) document.documentElement.style.setProperty(k, v[k]); } catch(e){} }
        })();
    </script>
</head>
<body>

<header class="lab-header">
    <button class="args-toggle" id="args-toggle" title="Toggle args panel" aria-pressed="false">☰ Args</button>
    <span class="lab-title">MF Table Lab</span>
    <nav class="preset-tabs" role="tablist">
        <button class="preset-tab active" data-preset="A1"  role="tab">A1 — Completed Leagues</button>
        <button class="preset-tab"        data-preset="A2"  role="tab">A2 — Annual Leaderboard</button>
        <button class="preset-tab"        data-preset="B1"  role="tab">B1 — Prizes</button>
        <button class="preset-tab"        data-preset="B2"  role="tab">B2 — Historical</button>
        <button class="preset-tab"        data-preset="B3"  role="tab">B3 — Predictor</button>
        <button class="preset-tab"        data-preset="B4"  role="tab">B4 — What If</button>
        <button class="preset-tab"        data-preset="B5"  role="tab">B5 — Rounds</button>
        <button class="preset-tab"        data-preset="B6a" role="tab">B6a — Remaining</button>
        <button class="preset-tab"        data-preset="B6b" role="tab">B6b — Per Player</button>
        <button class="preset-tab"        data-preset="B6c" role="tab">B6c — Unplayed</button>
        <button class="preset-tab"        data-preset="C1"  role="tab">C1 — Leagues</button>
        <button class="preset-tab"        data-preset="C2"  role="tab">C2 — Match History</button>
        <button class="preset-tab"        data-preset="C3"  role="tab">C3 — Matchup</button>
        <button class="preset-tab"        data-preset="D"   role="tab">D — League Table</button>
        <button class="preset-tab"        data-preset="E"   role="tab">E — Match History</button>
    </nav>
</header>

<main class="lab-workspace">

    <!-- LEFT: argument panel -->
    <aside class="args-column">
        <div id="args-panel"></div>
    </aside>

    <!-- RIGHT: live table preview -->
    <section class="preview-column">
        <div id="mf-mount"></div>
    </section>

</main>

<script type="module" src="./lab.js"></script>
<script>
    const toggleBtn = document.getElementById('args-toggle');
    const workspace = document.querySelector('.lab-workspace');

    // Args panel open by default only on wide screens
    const startCollapsed = window.innerWidth < 960;
    if (startCollapsed) {
        workspace.classList.add('args-collapsed');
        toggleBtn.textContent = '☰';
        toggleBtn.setAttribute('aria-pressed', 'false');
    } else {
        toggleBtn.textContent = '✕ Args';
        toggleBtn.setAttribute('aria-pressed', 'true');
    }

    toggleBtn.addEventListener('click', () => {
        const collapsed = workspace.classList.toggle('args-collapsed');
        toggleBtn.textContent = collapsed ? '☰' : '✕ Args';
        toggleBtn.setAttribute('aria-pressed', String(!collapsed));
    });

    // Drag-to-scroll on tab strip
    const tabs = document.querySelector('.preset-tabs');
    let isDragging = false, dragStartX = 0, dragScrollLeft = 0, hasMoved = false;

    tabs.addEventListener('mousedown', e => {
        if (e.button !== 0) return;
        isDragging = true;
        hasMoved = false;
        dragStartX = e.pageX - tabs.getBoundingClientRect().left;
        dragScrollLeft = tabs.scrollLeft;
    });

    document.addEventListener('mousemove', e => {
        if (!isDragging) return;
        const x = e.pageX - tabs.getBoundingClientRect().left;
        const delta = x - dragStartX;
        if (Math.abs(delta) > 4) {
            hasMoved = true;
            tabs.classList.add('is-dragging');
            tabs.scrollLeft = dragScrollLeft - delta;
        }
    });

    document.addEventListener('mouseup', () => {
        if (!isDragging) return;
        isDragging = false;
        tabs.classList.remove('is-dragging');
    });

    // Prevent tab click after drag
    tabs.addEventListener('click', e => {
        if (hasMoved) e.stopImmediatePropagation();
    }, true);
</script>
</body>
</html>
