    <script>
      (function(){
        var t=localStorage.getItem('shabi-theme');
        if(t==='modern')t='nature';if(t==='royal')t='vegas';if(t&&t!=='current'){document.documentElement.dataset.theme=t;localStorage.setItem('shabi-theme',t);}
        var c=localStorage.getItem('shabi-custom-vars');
        if(c){try{var v=JSON.parse(c);for(var k in v)document.documentElement.style.setProperty(k,v[k])}catch(e){}}
      })();
    </script>
</head>
<body>
    <div class="page-container" id="main" role="main">
        <div class="page-header">
            <h1 id="page-title">Loading...</h1>
            <div id="league-subtitle" class="subtitle"></div>
        </div>
        <div id="content">
            <div class="loading">Loading player profile...</div>
        </div>
    </div>
    <script type="module">
        import { renderPlayerGeneralPage } from './js/render/playerGeneralPage.js';
        import { applyThemeBootstrap } from './js/render/themePicker.js';
        import { initNavBar, initKeyboardShortcuts } from './js/render/navigation.js';
        import { mountSiteSidebar } from './js/render/siteSidebar.js';
        import { isPreviewMode, installPreviewInterceptor } from './js/admin/previewMode.js';

        // Install fetch interceptor BEFORE any data loads so staged changes are served
        if (isPreviewMode()) installPreviewInterceptor();

        const isEmbedded = window.self !== window.top;

        if (isEmbedded) {
            // Suppress interactive chrome in preview iframe, but keep the nav search functional
            const style = document.createElement('style');
            style.textContent = `
                a:not(.nav-search a):not(.nav-search-results a) { pointer-events: none !important; cursor: default !important; opacity: 0.7 !important; }
                .nav-search, .nav-search * { pointer-events: auto !important; opacity: 1 !important; }
                .nav-search input { cursor: text !important; }
                .nav-search-results a { cursor: pointer !important; }
                .preview-banner { display: none !important; }
                body.preview-active { padding-top: 0 !important; }
                .site-sidebar, .site-mobile-topbar, .site-backdrop { display: none !important; }
            `;
            document.head.appendChild(style);
        }

        applyThemeBootstrap();
        await initNavBar();
        if (!isEmbedded) {
            const playerName = new URLSearchParams(location.search).get('player') || '';
            mountSiteSidebar({ activeView: 'player', playerName, topbarTitle: 'Player' });
        }
        await renderPlayerGeneralPage();

        if (!isEmbedded) {
            initKeyboardShortcuts();
        }
    </script>
</body>
</html>
