<!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League — Shabi Israel</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/theme-picker.css">
    <script>
      (function(){
        var t=localStorage.getItem('shabi-theme');
        if(t&&t!=='current')document.documentElement.dataset.theme=t;
        var c=localStorage.getItem('shabi-custom-vars');
        if(c){try{var v=JSON.parse(c);for(var k in v)document.documentElement.style.setProperty(k,v[k])}catch(e){}}
      })();
    </script>
</head>
<body>
    <div class="page-container">
        <a href="index.html" class="back-link">Back to All Leagues</a>
        <div class="page-header">
            <h1 id="page-title">Loading...</h1>
        </div>
        <div id="content">
            <div class="loading">Loading league data...</div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script type="module">
        import { renderLeaguePage } from './js/render/leaguePage.js';
        import { initThemePicker } from './js/render/themePicker.js';
        import { addRemainingReportButton } from './js/admin/remainingReport.js';
        import { getQueryParam } from './js/utils/helpers.js';

        await renderLeaguePage();
        initThemePicker();

        // Add remaining report button after the table
        const leagueId = getQueryParam('league');
        if (leagueId) {
            addRemainingReportButton(document.getElementById('content'), leagueId);
        }
    </script>
</body>
</html>
